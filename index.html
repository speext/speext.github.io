<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Kreutzer</title>
  <link rel="icon" type="image/png" href="logo.png">
  <!-- Antonio Light (300) + Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300&family=Roboto:wght@400&display=swap" rel="stylesheet" />

  <style>
    /* ── VARIABLEN ── */
    :root {
      --red:        #B22918;
      --white:      #ffffff;
      --yt-red:     #FF0000;
      --x-white:    #ffffff;
      --font-hero:  'Antonio', sans-serif;
      --font-nav:   'Roboto', sans-serif;
      --nav-color:  rgba(255,255,255,0.85);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--white);
      font-family: var(--font-nav);
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('Landing.jpg') center center / cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px;
      gap: 24px;
    }

    /* Logo */
    .nav-logo img {
      height: 44px;
      width: auto;
      display: block;
    }

    /* Nav-Links + Icons zusammen rechts */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
  font-family: var(--font-nav);
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--nav-color);
  text-decoration: none;
  transition: color 0.2s ease;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);   /* ← neu */
}

    .nav-links a:hover {
      color: var(--red);
    }

    /* Social Icons – Grundfarbe: Logo-Rot */
    .nav-icons {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-icons a {
      display: flex;
      align-items: center;
      color: var(--red);
      text-decoration: none;
      transition: color 0.2s ease, filter 0.2s ease;
    }

    .nav-icons a svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* X → Hover: Weiß mit Glow */
    .nav-icons a.icon-x:hover {
      color: var(--x-white);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
    }

    /* YouTube → Hover: YouTube-Rot mit Glow */
    .nav-icons a.icon-yt:hover {
      color: var(--yt-red);
      filter: drop-shadow(0 0 6px rgba(255,0,0,0.6));
    }

    /* ── HERO TEXT ── */
    .hero-text-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hero-text {
      line-height: 1;
      font-family: var(--font-hero);
      font-weight: 300;
      font-size: clamp(4rem, 11vw, 10rem);
      letter-spacing: 0.05em;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: 0 0.18em;
	  text-shadow: 0 5px 8px rgba(0,0,0,0.9);
    }

    .hero-text span {
      display: inline-block;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    .hero-text .t1 { animation-delay: 0s;    }
    .hero-text .t2 { animation-delay: 0.25s; }
    .hero-text .t3 { animation-delay: 0.5s;  }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {

      /* Hero: Nav nach unten schieben */
      .hero {
        justify-content: flex-end;  /* Nav klebt am unteren Rand */
      }

      nav {
        flex-direction: column;
        align-items: center;
        padding: 20px 24px 36px;   /* extra Padding unten für Daumen-Komfort */
        gap: 14px;
      }

      .nav-right {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .nav-links {
        gap: 20px;
      }

      /* KROSSER bricht in neue Zeile */
      .hero-text {
        font-size: clamp(3rem, 18vw, 5.5rem);
      }

      .hero-text .t3 {
        flex-basis: 100%;
        text-align: center;
      }
    }
	/* ── DROP SHADOW: Nav-Links + Social Icons ── */
.nav-links a {
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}

.nav-icons a svg {
  filter: drop-shadow(0 1px 6px rgba(0,0,0,0.8));
}
	
	
  </style>
</head>
<body>

<section class="hero">

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">
      <img src="logo.png" alt="Daniel Kreutzer Logo" />
    </a>

    <div class="nav-right">
      <ul class="nav-links">
        <!--
		<li><a href="writing.html">Writing</a></li>
        <li><a href="now.html">Now</a></li>
        <li><a href="about.html">About</a></li>
		-->
      </ul>

      <div class="nav-icons">
        <!-- X -->
        <a href="https://x.com/danielkreutzer" class="icon-x" target="_blank" rel="noopener" aria-label="X">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>

        <!-- YouTube -->
        <a href="https://youtube.com/@danielkreutzer" class="icon-yt" target="_blank" rel="noopener" aria-label="YouTube">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO TEXT: absolut zentriert -->
  <div class="hero-text-wrapper">
    <div class="hero-text" aria-label="This is Krosser">
      <span class="t1">THIS.</span>
      <span class="t2">IS.</span>
      <span class="t3">KROSSER</span>
    </div>
  </div>

</section>

</body>
</html>
