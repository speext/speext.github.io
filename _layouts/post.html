---
layout: default
---
<article class="post">
  <header class="post-header">
    <span class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</span>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <a class="back-link" href="{{ '/writing/' | relative_url }}">← Zurück zu Writing</a>
</article>
